services:
  - type: web
    name: botifutbol-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          type: postgresql
          name: botifutbol-db
      - key: TELEGRAM_TOKEN
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: worker
    name: botifutbol-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot/bot.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          type: postgresql
          name: botifutbol-db
      - key: TELEGRAM_TOKEN
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
